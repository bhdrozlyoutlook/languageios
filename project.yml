name: LanguageIOS

options:
  bundleIdPrefix: com.bhdrozly
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
    CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]: NO

packages:
  FlagKit:
    url: https://github.com/madebybowtie/FlagKit.git
    from: 2.4.0

targets:
  LanguageIOSApp:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources/LanguageIOS
    dependencies:
      - package: FlagKit
        product: FlagKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bhdrozly.languageios
        PRODUCT_NAME: LanguageIOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: LanguageIOS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: LaunchBackground
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  LanguageIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: LanguageIOSApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bhdrozly.languageios.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LanguageIOSApp:
    build:
      targets:
        LanguageIOSApp: all
        LanguageIOSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LanguageIOSUITests
