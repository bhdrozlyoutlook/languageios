name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # No Secrets.plist in CI — Gemini/ElevenLabs/RevenueCat adapters fall back to their
      # on-device/stub paths, so the suite is deterministic and key-free.
      - name: Swift build (library)
        run: swift build

      - name: Swift test (library, 170 tests)
        run: swift test --parallel

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # iOS app-target compile check (catches UIKit-gated code the macOS SwiftPM build
      # skips). Informational: runner Xcode/SDK drift shouldn't block the test gate.
      - name: iOS app build (compile check)
        continue-on-error: true
        run: |
          xcodebuild build \
            -project LanguageIOS.xcodeproj \
            -scheme LanguageIOSApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint (informational)
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint || true
